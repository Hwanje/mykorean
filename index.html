<style>
/* ============ RESET & BASE ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; overscroll-behavior-y: none; }
body {
  font-family: 'Noto Serif KR', 'Nanum Myeongjo', serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.7;
  color: #1f1a15;
  background: #f4ede1;
  min-height: 100vh;
  overflow-x: hidden;
  word-break: keep-all;
  -webkit-font-smoothing: antialiased;
  padding-top: env(safe-area-inset-top);
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
}

/* ============ PAPER TEXTURE BACKGROUND ============ */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(182, 58, 42, 0.04) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(74, 54, 36, 0.05) 0%, transparent 40%),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(74, 54, 36, 0.012) 2px, rgba(74, 54, 36, 0.012) 3px);
  pointer-events: none;
  z-index: 0;
}

body.dark {
  background: #14110d;
  color: #e8dfce;
}
body.dark::before {
  background-image:
    radial-gradient(circle at 20% 30%, rgba(217, 106, 87, 0.06) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(230, 200, 140, 0.04) 0%, transparent 40%),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(230, 200, 140, 0.02) 2px, rgba(230, 200, 140, 0.02) 3px);
}

/* ============ COLOR TOKENS ============ */
:root {
  --ink: #1f1a15;
  --ink-soft: #4a3624;
  --ink-dim: #8c7960;
  --paper: #f4ede1;
  --paper-soft: #ede3d1;
  --paper-warm: #e8dcc2;
  --seal: #b63a2a;
  --seal-deep: #8f2a1e;
  --gold: #a37c2c;
  --moss: #5a6b3a;
  --line: rgba(74, 54, 36, 0.18);
  --line-strong: rgba(74, 54, 36, 0.4);
  --shadow-soft: 0 1px 2px rgba(31, 26, 21, 0.05), 0 2px 8px rgba(31, 26, 21, 0.04);
  --shadow-lift: 0 4px 12px rgba(31, 26, 21, 0.08), 0 8px 24px rgba(31, 26, 21, 0.06);
}
body.dark {
  --ink: #e8dfce;
  --ink-soft: #d4c5a8;
  --ink-dim: #8c7960;
  --paper: #14110d;
  --paper-soft: #1f1a14;
  --paper-warm: #2a221a;
  --seal: #d96a57;
  --seal-deep: #b84a38;
  --gold: #d9b764;
  --moss: #a5b674;
  --line: rgba(230, 200, 140, 0.15);
  --line-strong: rgba(230, 200, 140, 0.35);
  --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.3), 0 2px 8px rgba(0, 0, 0, 0.2);
  --shadow-lift: 0 4px 12px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.3);
}

/* ============ HEADER ============ */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(244, 237, 225, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding-top: env(safe-area-inset-top);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
body.dark header {
  background: rgba(20, 17, 13, 0.92);
}
header.hidden { transform: translateY(-100%); }
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.8rem 1.2rem;
  max-width: 900px;
  margin: 0 auto;
}
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.logo-seal {
  width: 34px;
  height: 34px;
  background: var(--seal);
  color: #f4ede1;
  font-family: 'Noto Serif KR', serif;
  font-weight: 900;
  font-size: 20px;
  display: grid;
  place-items: center;
  border-radius: 4px;
  letter-spacing: -2px;
  transform: rotate(-2deg);
  box-shadow: 0 1px 3px rgba(143, 42, 30, 0.3);
  flex-shrink: 0;
}
.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}
.logo-title {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 1.05rem;
  color: var(--ink);
  letter-spacing: 0.02em;
}
.logo-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  gap: 0.4rem;
  align-items: center;
}
.icon-btn {
  width: 38px; height: 38px;
  display: grid; place-items: center;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--ink);
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}
.icon-btn:active { transform: scale(0.94); background: var(--paper-soft); }

/* ============ D-DAY BANNER ============ */
.dday-banner {
  max-width: 900px;
  margin: 0.6rem auto 0;
  padding: 0 1.2rem;
}
.dday-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
  padding: 0.8rem 1rem;
  background: linear-gradient(135deg, var(--paper-soft) 0%, var(--paper-warm) 100%);
  border: 1px solid var(--line);
  border-left: 3px solid var(--seal);
  border-radius: 4px;
  box-shadow: var(--shadow-soft);
}
.dday-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.15rem;
}
.dday-title {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--ink);
}
.dday-count {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 1.3rem;
  color: var(--seal);
  letter-spacing: -0.02em;
}

/* ============ MAIN CONTAINER ============ */
main {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.2rem 1.2rem 2rem;
  position: relative;
  z-index: 1;
}

/* ============ SECTION TITLES ============ */
.section-title {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--ink);
  margin: 1.5rem 0 0.8rem;
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
}
.section-title::before {
  content: "";
  width: 4px;
  height: 16px;
  background: var(--seal);
  display: inline-block;
  margin-right: 0.1rem;
}
.section-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 400;
}

/* ============ HOME: CATEGORY TILES ============ */
.home-hero {
  margin: 0.5rem 0 1.2rem;
  padding: 1.5rem 1.2rem;
  background:
    linear-gradient(180deg, rgba(244, 237, 225, 0) 0%, rgba(237, 227, 209, 0.6) 100%),
    var(--paper-soft);
  border: 1px solid var(--line);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}
.home-hero::after {
  content: "試";
  position: absolute;
  right: -10px;
  bottom: -30px;
  font-family: 'Noto Serif KR', serif;
  font-weight: 900;
  font-size: 120px;
  color: var(--ink);
  opacity: 0.04;
  line-height: 1;
}
.hero-kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--seal);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.hero-title {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 1.6rem;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 0.6rem;
}
.hero-desc {
  font-size: 0.9rem;
  color: var(--ink-soft);
  line-height: 1.6;
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.8rem;
  margin-bottom: 0.5rem;
}
.cat-tile {
  position: relative;
  padding: 1rem 1rem 1.1rem;
  background: var(--paper-soft);
  border: 1px solid var(--line);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  overflow: hidden;
  min-height: 112px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.cat-tile::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: var(--tile-accent, var(--seal));
  transform-origin: left;
  transform: scaleX(0.3);
  transition: transform 0.3s;
}
.cat-tile:active { transform: scale(0.98); }
.cat-tile:active::before { transform: scaleX(1); }
.cat-tile[data-cat="gojeon_siga"] { --tile-accent: #b63a2a; }
.cat-tile[data-cat="hyundae_si"] { --tile-accent: #5a6b3a; }
.cat-tile[data-cat="gojeon_sanmun"] { --tile-accent: #a37c2c; }
.cat-tile[data-cat="dokseo"] { --tile-accent: #2d5a7e; }
.cat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--ink-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.cat-name {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 1.15rem;
  color: var(--ink);
  margin-bottom: 0.3rem;
  line-height: 1.2;
}
.cat-count {
  display: flex;
  align-items: baseline;
  gap: 0.3rem;
  margin-top: auto;
}
.cat-count-num {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 1.4rem;
  color: var(--tile-accent, var(--ink));
}
.cat-count-unit {
  font-size: 0.75rem;
  color: var(--ink-dim);
}
.cat-progress {
  position: absolute;
  bottom: 0; left: 0;
  height: 3px;
  background: var(--tile-accent, var(--seal));
  transition: width 0.4s ease;
  opacity: 0.6;
}

/* ============ QUICK ACTIONS ============ */
.quick-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  margin: 1.2rem 0;
}
.quick-btn {
  padding: 0.9rem 0.9rem;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 4px;
  text-align: left;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  transition: all 0.2s;
}
.quick-btn:active { transform: scale(0.97); background: var(--paper-soft); }
.quick-btn-icon {
  font-size: 1rem;
  margin-bottom: 0.2rem;
}
.quick-btn-title {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--ink);
}
.quick-btn-desc {
  font-size: 0.72rem;
  color: var(--ink-dim);
}

/* ============ WORK LIST ============ */
.work-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.work-card {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.9rem 1rem;
  background: var(--paper-soft);
  border: 1px solid var(--line);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  text-align: left;
  width: 100%;
}
.work-card:active { transform: scale(0.99); }
.work-card.done {
  background: linear-gradient(90deg, rgba(90, 107, 58, 0.08) 0%, var(--paper-soft) 50%);
  border-left: 3px solid var(--moss);
}
.work-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink-dim);
  min-width: 24px;
}
.work-info {
  flex: 1;
  min-width: 0;
}
.work-title {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--ink);
  margin-bottom: 0.2rem;
}
.work-meta {
  font-size: 0.72rem;
  color: var(--ink-dim);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.work-check {
  width: 24px; height: 24px;
  border: 1.5px solid var(--line-strong);
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: transparent;
  transition: all 0.2s;
  flex-shrink: 0;
  font-size: 0.8rem;
  font-weight: 700;
}
.work-card.done .work-check {
  background: var(--moss);
  border-color: var(--moss);
  color: var(--paper);
}

/* ============ DETAIL VIEW ============ */
.detail-view {
  display: none;
  animation: fadeUp 0.3s ease;
}
.detail-view.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.4rem 0.7rem;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 4px;
  font-family: 'Noto Serif KR', serif;
  font-size: 0.82rem;
  color: var(--ink-soft);
  cursor: pointer;
  margin-bottom: 0.8rem;
}
.back-btn:active { background: var(--paper-soft); }

.detail-header {
  margin-bottom: 1.2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--line);
}
.detail-kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--seal);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.35rem;
}
.detail-title {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 1.55rem;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 0.3rem;
}
.detail-sub {
  font-size: 0.82rem;
  color: var(--ink-dim);
  font-style: italic;
}

/* ============ TABS in detail ============ */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 1.2rem;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 0.6rem 0.9rem;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 500;
  font-size: 0.88rem;
  color: var(--ink-dim);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.tab.active {
  color: var(--ink);
  border-bottom-color: var(--seal);
  font-weight: 700;
}
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeUp 0.25s ease; }

/* ============ ORIGINAL TEXT (poem/prose) ============ */
.work-original {
  background: var(--paper-soft);
  border: 1px solid var(--line);
  padding: 1.4rem 1.1rem;
  border-radius: 4px;
  position: relative;
  margin-bottom: 1rem;
}
.work-original::before {
  content: "原文";
  position: absolute;
  top: -10px;
  left: 14px;
  background: var(--paper);
  padding: 0 0.5rem;
  font-family: 'Noto Serif KR', serif;
  font-size: 0.72rem;
  color: var(--ink-dim);
  letter-spacing: 0.1em;
}
body.dark .work-original::before { background: var(--paper); }
.poem-line {
  display: block;
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1rem;
  line-height: 2;
  color: var(--ink);
  padding-left: 0;
}
.poem-stanza { margin-bottom: 1rem; }
.poem-note {
  display: block;
  font-size: 0.78rem;
  color: var(--ink-dim);
  margin-top: 0.8rem;
  padding-top: 0.8rem;
  border-top: 1px dashed var(--line);
  line-height: 1.6;
}
.prose-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 0.95rem;
  line-height: 1.85;
  color: var(--ink);
}
.prose-text p { margin-bottom: 0.8rem; }
.prose-text .dialogue {
  padding-left: 1rem;
  border-left: 2px solid var(--line);
  color: var(--ink-soft);
  font-style: normal;
  margin: 0.5rem 0;
}

/* ============ ANALYSIS BLOCKS ============ */
.analysis-block {
  margin-bottom: 1rem;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
}
.analysis-head {
  padding: 0.8rem 1rem;
  background: linear-gradient(180deg, var(--paper-soft) 0%, var(--paper) 100%);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.analysis-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--seal);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.15rem 0.4rem;
  border: 1px solid currentColor;
  border-radius: 2px;
}
.analysis-title {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--ink);
}
.analysis-body {
  padding: 0.9rem 1rem;
  font-size: 0.9rem;
  line-height: 1.75;
  color: var(--ink);
}
.analysis-body strong {
  color: var(--seal);
  font-weight: 700;
}
.kv-list {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  list-style: none;
}
.kv-list li {
  display: flex;
  gap: 0.6rem;
  padding: 0.35rem 0;
}
.kv-key {
  font-family: 'Nanum Myeongjo', serif;
  font-weight: 700;
  color: var(--seal-deep);
  min-width: 90px;
  font-size: 0.88rem;
  flex-shrink: 0;
}
body.dark .kv-key { color: var(--seal); }
.kv-val {
  color: var(--ink);
  font-size: 0.9rem;
}

/* ============ CHIPS / TAGS ============ */
.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-top: 0.5rem;
}
.chip {
  padding: 0.22rem 0.55rem;
  background: var(--paper-warm);

// ---------- STATE ----------
const STATE = {
  currentTab: 'home',       // home | study | flashcard | quiz | progress
  currentWorkId: null,
  currentSubtab: 'original',
  progress: {},             // { workId: true }
  flashcardsSeen: {},       // { term: count }
  quizResults: [],          // [{ date, mode, score, total, categoryOrWorkId }]
};

const STORAGE_KEY = 'simhwa_kor_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      Object.assign(STATE, parsed);
    }
  } catch(e) {}
}
function saveState() {
  const toSave = {
    progress: STATE.progress,
    flashcardsSeen: STATE.flashcardsSeen,
    quizResults: STATE.quizResults,
    darkMode: STATE.darkMode,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave)); } catch(e) {}
}

// ---------- UTILITIES ----------
function el(tag, attrs={}, children=[]) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'onclick') e.addEventListener('click', attrs[k]);
    else if (k === 'data') { for(const d in attrs.data) e.dataset[d] = attrs.data[d]; }
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  if (typeof children === 'string') e.textContent = children;
  else if (Array.isArray(children)) children.forEach(c => c && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function calcDday() {
  const exam = new Date(EXAM_DATE + 'T09:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.ceil((exam - today) / (1000 * 60 * 60 * 24));
  return diff;
}

// Find a work by id
function findWork(id) {
  for (const catKey in WORKS) {
    const cat = WORKS[catKey];
    for (const item of cat.items) {
      if (item.id === id) return { cat: catKey, work: item };
    }
  }
  return null;
}

// Normalize answer for fill-in
function normalizeAnswer(s) {
  return String(s).replace(/\s+/g, ' ').trim().toLowerCase();
}

// ---------- MAIN RENDER ----------
function render() {
  const root = document.body;
  let header = document.querySelector('header');
  let nav = document.querySelector('.bottom-nav');
  let main = document.getElementById('main-content');
  let ddayBanner = document.querySelector('.dday-banner');
  let modalRoot = document.getElementById('modal-root');

  // First run — build the persistent shell (header + nav + main slot)
  if (!header || !main || !nav) {
    root.innerHTML = '';

    header = el('header');
    header.appendChild(buildHeaderContent());
    root.appendChild(header);

    // D-Day banner wrapper (always in DOM; contents swapped each render)
    ddayBanner = el('div', { id: 'dday-slot' });
    root.appendChild(ddayBanner);

    main = el('main', { id: 'main-content' });
    root.appendChild(main);

    nav = buildBottomNav();
    root.appendChild(nav);

    modalRoot = el('div', { id: 'modal-root' });
    root.appendChild(modalRoot);
  } else {
    // Subsequent renders — just refresh the in-place elements without nuking header
    // Preserve hidden state across re-renders
    const wasHidden = header.classList.contains('hidden');

    // Update header icon (dark mode toggle may have changed)
    header.innerHTML = '';
    header.appendChild(buildHeaderContent());
    if (wasHidden) header.classList.add('hidden');

    // Update bottom nav active state
    const newNav = buildBottomNav();
    nav.replaceWith(newNav);

    // Clear dday slot (will re-populate below)
    if (!ddayBanner) {
      ddayBanner = el('div', { id: 'dday-slot' });
      main.parentNode.insertBefore(ddayBanner, main);
    }
    ddayBanner.innerHTML = '';
  }

  // Populate D-Day banner (only on home)
  const bannerEl = buildDdayBanner();
  if (bannerEl) ddayBanner.appendChild(bannerEl);

  // Render the tab content into main
  renderTab();
}

function buildHeaderContent() {
  const inner = el('div', { class: 'header-inner' });

  const logoWrap = el('div', { class: 'logo-wrap' });
  logoWrap.appendChild(el('div', { class: 'logo-seal' }, '國'));
  const textWrap = el('div', { class: 'logo-text' });
  textWrap.appendChild(el('span', { class: 'logo-title' }, '심화 국어'));
  textWrap.appendChild(el('span', { class: 'logo-sub' }, '중간고사 대비'));
  logoWrap.appendChild(textWrap);
  inner.appendChild(logoWrap);

  const right = el('div', { class: 'header-right' });
  right.appendChild(el('button', {
    class: 'icon-btn',
    'aria-label':'다크모드',
    onclick: toggleDark,
  }, document.body.classList.contains('dark') ? '◑' : '◐'));
  right.appendChild(el('button', {
    class: 'icon-btn',
    'aria-label':'정보',
    onclick: showInfoModal,
  }, 'ⓘ'));
  inner.appendChild(right);

  return inner;
}

function buildDdayBanner() {
  // Only show on home
  if (STATE.currentTab !== 'home') return null;

  const wrap = el('div', { class: 'dday-banner' });
  const inner = el('div', { class: 'dday-inner' });
  const left = el('div');
  left.appendChild(el('div', { class:'dday-label' }, '2026 · 1학기 · 중간고사'));
  left.appendChild(el('div', { class:'dday-title' }, '심화 국어 · 4/27(월) 3교시'));
  inner.appendChild(left);
  const d = calcDday();
  const countTxt = d > 0 ? `D-${d}` : d === 0 ? 'D-DAY' : `D+${Math.abs(d)}`;
  inner.appendChild(el('div', { class:'dday-count' }, countTxt));
  wrap.appendChild(inner);
  return wrap;
}

function buildBottomNav() {
  const nav = el('div', { class: 'bottom-nav' });
  const items = [
    { id: 'home',       label: '홈',     icon: '家' },
    { id: 'study',      label: '학습',   icon: '學' },
    { id: 'flashcard',  label: '카드',   icon: '字' },
    { id: 'quiz',       label: '문제',   icon: '問' },
    { id: 'progress',   label: '진도',   icon: '記' },
  ];
  items.forEach(item => {
    const btn = el('button', {
      class: 'nav-item' + (STATE.currentTab === item.id ? ' active' : ''),
      onclick: () => switchTab(item.id),
    });
    btn.appendChild(el('div', { class:'nav-icon' }, item.icon));
    btn.appendChild(el('div', { class:'nav-label' }, item.label));
    nav.appendChild(btn);
  });
  return nav;
}

function switchTab(id) {
  STATE.currentTab = id;
  STATE.currentWorkId = null;
  render();
  window.scrollTo(0, 0);
}

// ---------- TAB CONTENT DISPATCH ----------
function renderTab() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  if (STATE.currentWorkId) {
    renderWorkDetail(main, STATE.currentWorkId);
    return;
  }

  switch (STATE.currentTab) {
    case 'home':       renderHome(main); break;
    case 'study':      renderStudyList(main); break;
    case 'flashcard':  renderFlashcardTab(main); break;
    case 'quiz':       renderQuizTab(main); break;
    case 'progress':   renderProgress(main); break;
  }
}

// ---------- HOME ----------
function renderHome(main) {
  // Hero
  const hero = el('div', { class: 'home-hero' });
  hero.appendChild(el('div', { class:'hero-kicker' }, 'Simhwa · Korean · Midterm'));
  hero.appendChild(el('div', { class:'hero-title', html:'2026학년도 1학기<br>심화 국어 중간고사' }));
  const doneCount = Object.values(STATE.progress).filter(v => v).length;
  const totalCount = countAllWorks();
  hero.appendChild(el('div', { class:'hero-desc',
    html: `선택형 18문항 + 서답형 4문항 · 50분<br><strong style="color:var(--ink)">진도: ${doneCount} / ${totalCount}</strong> 작품·지문 완료`
  }));
  main.appendChild(hero);

  // Categories
  main.appendChild(makeSectionTitle('학습 영역', '4 areas'));
  const grid = el('div', { class:'category-grid' });
  for (const catKey of ['gojeon_siga', 'hyundae_si', 'gojeon_sanmun', 'dokseo']) {
    const cat = WORKS[catKey];
    const total = cat.items.length;
    const done = cat.items.filter(it => STATE.progress[it.id]).length;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;

    const tile = el('button', {
      class: 'cat-tile',
      data: { cat: catKey },
      onclick: () => { STATE.currentTab = 'study'; STATE.studyCategory = catKey; render(); window.scrollTo(0,0); },
    });
    tile.appendChild(el('div', { class:'cat-label' }, cat.hanja));
    tile.appendChild(el('div', { class:'cat-name' }, cat.label));
    const cntRow = el('div', { class:'cat-count' });
    cntRow.appendChild(el('span', { class:'cat-count-num' }, `${done}/${total}`));
    cntRow.appendChild(el('span', { class:'cat-count-unit' }, '완료'));
    tile.appendChild(cntRow);
    const prog = el('div', { class:'cat-progress' });
    prog.style.width = pct + '%';
    tile.appendChild(prog);
    grid.appendChild(tile);
  }
  main.appendChild(grid);

  // Quick actions
  main.appendChild(makeSectionTitle('바로 시작', 'quick start'));
  const quick = el('div', { class:'quick-actions' });
  quick.appendChild(makeQuickBtn('📝', 'OX 퀴즈', '학습지 O/X 문제 풀이', () => startQuizMode('ox')));
  quick.appendChild(makeQuickBtn('✏️', '빈칸 채우기', '서답형 연습', () => startQuizMode('fill')));
  quick.appendChild(makeQuickBtn('🎴', '개념 카드', '핵심 용어 플래시카드', () => switchTab('flashcard')));
  quick.appendChild(makeQuickBtn('📚', '기출 문제', '객관식 수능특강 문제', () => startQuizMode('mcq')));
  main.appendChild(quick);

  // Recent / continue
  const lastViewed = STATE.lastViewedWork;
  if (lastViewed) {
    const found = findWork(lastViewed);
    if (found) {
      main.appendChild(makeSectionTitle('이어서 공부', 'continue'));
      main.appendChild(makeWorkCard(found.work, found.cat, 0));
    }
  }
}

function makeSectionTitle(title, sub) {
  const h = el('h2', { class:'section-title' });
  h.appendChild(document.createTextNode(title));
  if (sub) h.appendChild(el('span', { class:'section-sub' }, sub));
  return h;
}

function makeQuickBtn(icon, title, desc, onclick) {
  const btn = el('button', { class:'quick-btn', onclick });
  btn.appendChild(el('div', { class:'quick-btn-icon' }, icon));
  btn.appendChild(el('div', { class:'quick-btn-title' }, title));
  btn.appendChild(el('div', { class:'quick-btn-desc' }, desc));
  return btn;
}

function countAllWorks() {
  let total = 0;
  for (const key in WORKS) total += WORKS[key].items.length;
  return total;
}

// ---------- STUDY LIST ----------
function renderStudyList(main) {
  const catKey = STATE.studyCategory || 'gojeon_siga';

  // Category switcher
  const pills = el('div', { class:'fc-category-pills' });
  ['gojeon_siga','hyundae_si','gojeon_sanmun','dokseo'].forEach(k => {
    const pill = el('button', {
      class: 'fc-pill' + (k === catKey ? ' active' : ''),
      onclick: () => { STATE.studyCategory = k; render(); window.scrollTo(0,0); },
    }, WORKS[k].label);
    pills.appendChild(pill);
  });
  main.appendChild(pills);

  const cat = WORKS[catKey];
  main.appendChild(makeSectionTitle(cat.label, cat.hanja));

  const list = el('div', { class:'work-list' });
  cat.items.forEach((item, idx) => {
    list.appendChild(makeWorkCard(item, catKey, idx + 1));
  });
  main.appendChild(list);
}

function makeWorkCard(item, catKey, num) {
  const done = !!STATE.progress[item.id];
  const card = el('button', {
    class: 'work-card' + (done ? ' done' : ''),
    onclick: () => openWork(item.id),
  });
  card.appendChild(el('span', { class:'work-num' }, num ? String(num).padStart(2,'0') : '·'));
  const info = el('div', { class:'work-info' });
  info.appendChild(el('div', { class:'work-title' }, item.title));
  const metaText = [item.author, item.genre, item.category].filter(Boolean).join(' · ');
  info.appendChild(el('div', { class:'work-meta' }, metaText));
  card.appendChild(info);
  card.appendChild(el('div', { class:'work-check' }, done ? '✓' : ''));
  return card;
}

function openWork(id) {
  STATE.currentWorkId = id;
  STATE.lastViewedWork = id;
  STATE.currentSubtab = 'original';
  saveState();
  render();
  window.scrollTo(0, 0);
}

// ---------- WORK DETAIL ----------
function renderWorkDetail(main, id) {
  const found = findWork(id);
  if (!found) { main.innerHTML = '<p>작품을 찾을 수 없습니다.</p>'; return; }
  const work = found.work;
  const catKey = found.cat;

  // Back button
  const back = el('button', { class:'back-btn', onclick: () => { STATE.currentWorkId = null; render(); window.scrollTo(0,0); } });
  back.appendChild(document.createTextNode('← 뒤로'));
  main.appendChild(back);

  // Header
  const header = el('div', { class:'detail-header' });
  header.appendChild(el('div', { class:'detail-kicker' }, WORKS[catKey].hanja + (work.hanja ? ' · ' + work.hanja : '')));
  header.appendChild(el('h1', { class:'detail-title' }, work.title));
  const subParts = [];
  if (work.author) subParts.push(work.author);
  if (work.genre) subParts.push(work.genre);
  if (work.period) subParts.push(work.period);
  if (work.category) subParts.push(work.category);
  if (subParts.length) header.appendChild(el('div', { class:'detail-sub' }, subParts.join(' · ')));
  if (work.theme) {
    const theme = el('div', { class:'analysis-body', style:'margin-top:0.6rem;padding:0.6rem 0.8rem;background:var(--paper-soft);border-left:3px solid var(--gold);border-radius:2px;font-size:0.85rem;' });
    theme.innerHTML = `<strong style="color:var(--gold);font-size:0.7rem;letter-spacing:0.1em;display:block;margin-bottom:0.3rem;">THEME · 주제</strong>${escapeHTML(work.theme)}`;
    header.appendChild(theme);
  }
  main.appendChild(header);

  // Tabs
  const isDokseo = (catKey === 'dokseo');
  const tabDefs = isDokseo
    ? [
        { id:'original', label:'지문·해설' },
        { id:'analysis', label:'문단 분석' },
        { id:'vocab',    label:'어휘' },
        { id:'quiz',     label:'문제 풀이' },
      ]
    : [
        { id:'original', label:'원문' },
        { id:'analysis', label:'작품 분석' },
        { id:'quiz',     label:'문제 풀이' },
      ];

  const tabs = el('div', { class:'tabs' });
  tabDefs.forEach(t => {
    const tab = el('button', {
      class: 'tab' + (STATE.currentSubtab === t.id ? ' active' : ''),
      onclick: () => { STATE.currentSubtab = t.id; render(); }
    }, t.label);
    tabs.appendChild(tab);
  });
  main.appendChild(tabs);

  // Tab content
  const content = el('div', { class:'tab-content active' });
  if (isDokseo) renderDokseoDetail(content, work);
  else renderLitDetail(content, work);
  main.appendChild(content);

  // Mark as done / Progress toggle
  const doneBtn = el('button', {
    class: 'btn btn-primary',
    style:'margin-top:1.5rem;width:100%;',
    onclick: () => {
      STATE.progress[work.id] = !STATE.progress[work.id];
      saveState();
      render();
    }
  }, STATE.progress[work.id] ? '✓ 학습 완료됨 — 취소' : '학습 완료로 표시');
  main.appendChild(doneBtn);
}

      const box = el('div', { class:'analysis-block' });
      const head = el('div', { class:'analysis-head' });

      container.appendChild(box);

      work.original.forEach(stanza => {
        const stDiv = el('div', { class:'poem-stanza' });

          stDiv.appendChild(el('div', { style:'font-family:"JetBrains Mono",monospace;font-size:0.7rem;color:var(--ink-dim);letter-spacing:0.1em;margin-bottom:0.5rem;text-transform:uppercase;' }, stanza.stanza));

        origBox.appendChild(stDiv);
      });
    } else if (work.passages && Array.isArray(work.passages)) {
      const proseDiv = el('div', { class:'prose-text' });
      work.passages.forEach(p => {
        if (p.label) {
          proseDiv.appendChild(el('div', { style:'font-family:"JetBrains Mono",monospace;font-size:0.7rem;color:var(--seal);letter-spacing:0.1em;margin:1rem 0 0.4rem;text-transform:uppercase;font-weight:600;' }, p.label));

        para.innerHTML = p.text;
        proseDiv.appendChild(para);
      });
      origBox.appendChild(proseDiv);
    }
    if (work.notes) {
      origBox.appendChild(el('span', { class:'poem-note' }, '【주】 ' + work.notes));

      block.appendChild(head);
      const body = el('div', { class:'analysis-body', html: a.body });
      block.appendChild(body);
      container.appendChild(block);
    });
  }
  else if (sub === 'quiz') {
    renderWorkQuiz(container, work.id);
  }
}

  else if (sub === 'vocab') {
    const block = el('div', { class:'analysis-block' });
    const head = el('div', { class:'analysis-head' });
    head.appendChild(el('span', { class:'analysis-label' }, 'VOCAB'));
    head.appendChild(el('span', { class:'analysis-title' }, '어휘·개념 정리'));
    block.appendChild(head);
    const body = el('div', { class:'analysis-body' });
    const list = el('ul', { class:'kv-list' });
    (work.vocab || []).forEach(v => {
      const li = el('li');
      li.appendChild(el('span', { class:'kv-key' }, v.term));
      li.appendChild(el('span', { class:'kv-val' }, v.def));
      list.appendChild(li);
    });
    body.appendChild(list);
    block.appendChild(body);
    container.appendChild(block);
  }
  else if (sub === 'quiz') {
    renderWorkQuiz(container, work.id);
  }
}

// ---------- WORK-SPECIFIC QUIZ ----------
function renderWorkQuiz(container, workId) {
  const oxSet = QUIZ_DATA.ox.filter(q => q.workId === workId);
  const mcqSet = QUIZ_DATA.mcq.filter(q => q.workId === workId);
  const fillSet = QUIZ_DATA.fill.filter(q => q.workId === workId);

  const wrap = el('div', { style:'display:flex;flex-direction:column;gap:0.6rem;' });

  if (oxSet.length) {
    wrap.appendChild(makeQuizStartBtn('OX 퀴즈', `O/X · ${oxSet.length}문항`, 'O', () => startQuizFlow(oxSet, 'ox', workId)));
  }
  if (mcqSet.length) {
    wrap.appendChild(makeQuizStartBtn('객관식 기출 문제', `5지선다 · ${mcqSet.length}문항`, '五', () => startQuizFlow(mcqSet, 'mcq', workId)));
  }
  if (fillSet.length) {
    wrap.appendChild(makeQuizStartBtn('빈칸 채우기 (서답형 연습)', `입력 · ${fillSet.length}문항`, '空', () => startQuizFlow(fillSet, 'fill', workId)));
  }

  if (!wrap.children.length) {
    const es = el('div', { class:'empty-state' });
    es.appendChild(el('div', { class:'empty-mark' }, '無'));
    es.appendChild(el('div', { class:'empty-text' }, '이 작품에 대한 문제가 준비 중입니다.'));
    wrap.appendChild(es);
  }
  container.appendChild(wrap);
}

function makeQuizStartBtn(title, desc, symbol, onclick) {
  const btn = el('button', {
    class:'work-card',
    style:'cursor:pointer;',
    onclick,
  });
  const sym = el('div', {
    style:'width:40px;height:40px;display:grid;place-items:center;background:var(--seal);color:var(--paper);font-family:"Nanum Myeongjo",serif;font-weight:900;font-size:18px;border-radius:4px;flex-shrink:0;'
  }, symbol);
  btn.appendChild(sym);
  const info = el('div', { class:'work-info' });
  info.appendChild(el('div', { class:'work-title' }, title));
  info.appendChild(el('div', { class:'work-meta' }, desc));
  btn.appendChild(info);
  btn.appendChild(el('div', { style:'color:var(--ink-dim);font-size:1rem;' }, '→'));
  return btn;
}

// ---------- FLASHCARD TAB ----------
function renderFlashcardTab(main) {
  main.appendChild(makeSectionTitle('플래시카드', 'flashcard'));

  // Category pills
  const types = [
    { id:'concept', label:'개념', data: QUIZ_DATA.flashcards.concept },
    { id:'word',    label:'어휘', data: QUIZ_DATA.flashcards.word },
  ];
  const type = STATE.fcType || 'concept';
  const pills = el('div', { class:'fc-category-pills' });
  types.forEach(t => {
    pills.appendChild(el('button', {
      class:'fc-pill' + (type === t.id ? ' active' : ''),
      onclick: () => { STATE.fcType = t.id; STATE.fcIndex = 0; STATE.fcFlipped = false; render(); },
    }, `${t.label} (${t.data.length})`));
  });
  main.appendChild(pills);

  // Sub category
  const allCards = (QUIZ_DATA.flashcards[type] || []);
  const subcats = [...new Set(allCards.map(c => c.cat))];
  const sub = STATE.fcSub || '전체';
  const subPills = el('div', { class:'fc-category-pills', style:'margin-top:0.2rem;' });
  ['전체', ...subcats].forEach(sc => {
    subPills.appendChild(el('button', {
      class: 'fc-pill' + (sub === sc ? ' active' : ''),
      onclick: () => { STATE.fcSub = sc; STATE.fcIndex = 0; STATE.fcFlipped = false; render(); },
    }, sc));
  });
  main.appendChild(subPills);

  // Current cards
  const cards = sub === '전체' ? allCards : allCards.filter(c => c.cat === sub);
  if (!cards.length) {
    const es = el('div', { class:'empty-state' });
    es.appendChild(el('div', { class:'empty-mark' }, '空'));
    es.appendChild(el('div', { class:'empty-text' }, '카드가 없습니다.'));
    main.appendChild(es);
    return;
  }

  const idx = Math.min(STATE.fcIndex || 0, cards.length - 1);
  const card = cards[idx];

  // Flashcard
  const stack = el('div', { class:'flashcard-stack' });
  const fc = el('div', {
    class: 'flashcard' + (STATE.fcFlipped ? ' flipped' : ''),
    onclick: () => { STATE.fcFlipped = !STATE.fcFlipped; render(); STATE.flashcardsSeen[card.term] = (STATE.flashcardsSeen[card.term]||0)+1; saveState(); },
  });
  // Front
  const front = el('div', { class:'flashcard-face flashcard-front' });
  front.appendChild(el('div', { class:'flashcard-label' }, card.cat));
  front.appendChild(el('div', { class:'flashcard-term' }, card.term));
  front.appendChild(el('div', { class:'flashcard-hint' }, 'TAP TO FLIP'));
  fc.appendChild(front);
  // Back
  const back = el('div', { class:'flashcard-face flashcard-back' });
  back.appendChild(el('div', { class:'flashcard-label' }, 'DEFINITION'));
  back.appendChild(el('div', { class:'flashcard-def' }, card.def));
  back.appendChild(el('div', { class:'flashcard-hint' }, 'TAP TO FLIP'));
  fc.appendChild(back);
  stack.appendChild(fc);
  main.appendChild(stack);

  // Nav
  const nav = el('div', { class:'flashcard-nav' });
  nav.appendChild(el('button', {
    class:'fc-nav-btn',
    onclick: () => { if ((STATE.fcIndex||0) > 0) { STATE.fcIndex--; STATE.fcFlipped = false; render(); } },
    ...(idx === 0 ? { disabled:'disabled' } : {}),
  }, '←'));
  nav.appendChild(el('div', { class:'flashcard-count' }, `${idx+1} / ${cards.length}`));
  nav.appendChild(el('button', {
    class:'fc-nav-btn',
    onclick: () => { if (idx < cards.length - 1) { STATE.fcIndex = idx+1; STATE.fcFlipped = false; render(); } },
    ...(idx === cards.length - 1 ? { disabled:'disabled' } : {}),
  }, '→'));
  main.appendChild(nav);

  // Shuffle / reset
  const controls = el('div', { style:'display:flex;gap:0.6rem;margin-top:1rem;' });
  controls.appendChild(el('button', {
    class:'btn btn-secondary',
    onclick: () => {
      // Shuffle
      const shuffled = shuffle(cards);
      STATE.fcShuffled = shuffled;
      STATE.fcIndex = 0;
      STATE.fcFlipped = false;
      // Since cards filter is derived each render, we cheat by swapping underlying data via index
      // Simpler: use state to control current ordering
      STATE.fcShuffleCounter = (STATE.fcShuffleCounter||0) + 1;
      render();
    }
  }, '↻ 섞기'));
  controls.appendChild(el('button', {
    class:'btn btn-ghost',
    onclick: () => { STATE.fcIndex = 0; STATE.fcFlipped = false; render(); },
  }, '처음으로'));
  main.appendChild(controls);
}

// ---------- QUIZ TAB ----------
function renderQuizTab(main) {
  if (STATE.quizSession) {
    renderQuizPlay(main);
    return;
  }
  if (STATE.quizResult) {
    renderQuizResult(main);
    return;
  }

  main.appendChild(makeSectionTitle('문제 풀이', 'quiz'));

  const intro = el('div', { class:'analysis-block' });
  const head = el('div', { class:'analysis-head' });
  head.appendChild(el('span', { class:'analysis-label' }, 'MODE'));
  head.appendChild(el('span', { class:'analysis-title' }, '모드를 선택하세요'));
  intro.appendChild(head);
  const body = el('div', { class:'analysis-body' });
  body.innerHTML = '세 가지 모드 중 원하는 방식을 선택해 문제를 풀 수 있어요. 범위를 전체 / 특정 영역 / 특정 작품으로 좁힐 수 있습니다.';
  intro.appendChild(body);
  main.appendChild(intro);

  // Mode cards
  const modes = [
    { id:'ox', title:'OX 퀴즈', desc:`학습지 O/X 문제 (전체 ${QUIZ_DATA.ox.length}문항)`, sym:'O' },
    { id:'mcq', title:'객관식 기출', desc:`5지선다 수능특강 문제 (전체 ${QUIZ_DATA.mcq.length}문항)`, sym:'五' },
    { id:'fill', title:'빈칸 채우기', desc:`서답형 연습 (전체 ${QUIZ_DATA.fill.length}문항)`, sym:'空' },
  ];
  const list = el('div', { class:'work-list' });
  modes.forEach(m => {
    list.appendChild(makeQuizStartBtn(m.title, m.desc, m.sym, () => startQuizMode(m.id)));
  });
  main.appendChild(list);

  // Prior results
  if (STATE.quizResults && STATE.quizResults.length) {
    main.appendChild(makeSectionTitle('최근 기록', 'history'));
    const hlist = el('div', { class:'work-list' });
    STATE.quizResults.slice(-5).reverse().forEach(r => {
      const card = el('div', { class:'work-card', style:'cursor:default;' });
      card.appendChild(el('span', { class:'work-num', style:'min-width:42px;' }, r.modeLabel || r.mode));
      const info = el('div', { class:'work-info' });
      info.appendChild(el('div', { class:'work-title' }, `${r.score} / ${r.total} (${Math.round(r.score/r.total*100)}%)`));
      info.appendChild(el('div', { class:'work-meta' }, new Date(r.date).toLocaleDateString('ko-KR') + (r.scope ? ' · ' + r.scope : '')));
      card.appendChild(info);
      hlist.appendChild(card);
    });
    main.appendChild(hlist);
  }
}

function startQuizMode(mode) {
  // Show a scope selector
  const setup = document.createElement('div');
  setup.className = 'modal-overlay active';

  const modal = el('div', { class:'modal' });
  modal.appendChild(el('button', { class:'modal-close', onclick: () => setup.remove() }, '×'));
  modal.appendChild(el('h3', {}, `${mode === 'ox' ? 'OX 퀴즈' : mode === 'mcq' ? '객관식 기출' : '빈칸 채우기'} 시작`));

  const pool = QUIZ_DATA[mode];
  const catOptions = [
    { id:'all', label:'전체' },
    { id:'gojeon_siga', label:'고전 시가' },
    { id:'hyundae_si', label:'현대시' },
    { id:'gojeon_sanmun', label:'고전 산문' },
    { id:'dokseo', label:'독서' },
  ];

  let scope = 'all';
  let count = 10;

  const scopeGroup = el('div', { class:'setup-group' });
  scopeGroup.appendChild(el('div', { class:'setup-label' }, '범위'));
  const scopeOpts = el('div', { class:'setup-options' });
  catOptions.forEach(opt => {
    const o = el('button', {
      class: 'setup-opt' + (scope === opt.id ? ' active' : ''),
      onclick: () => {
        scope = opt.id;
        scopeOpts.querySelectorAll('.setup-opt').forEach(b => b.classList.remove('active'));
        o.classList.add('active');
      }
    }, opt.label);
    scopeOpts.appendChild(o);
  });
  scopeGroup.appendChild(scopeOpts);
  modal.appendChild(scopeGroup);

  const countGroup = el('div', { class:'setup-group' });
  countGroup.appendChild(el('div', { class:'setup-label' }, '문항 수'));
  const countOpts = el('div', { class:'setup-options' });
  [5, 10, 20, '전체'].forEach(n => {
    const o = el('button', {
      class: 'setup-opt' + (count === n ? ' active' : ''),
      onclick: () => {
        count = n;
        countOpts.querySelectorAll('.setup-opt').forEach(b => b.classList.remove('active'));
        o.classList.add('active');
      }
    }, typeof n === 'number' ? `${n}문항` : n);
    countOpts.appendChild(o);
  });
  countGroup.appendChild(countOpts);
  modal.appendChild(countGroup);

  const actions = el('div', { class:'quiz-controls' });
  actions.appendChild(el('button', {
    class:'btn btn-ghost',
    onclick: () => setup.remove(),
  }, '취소'));
  actions.appendChild(el('button', {
    class:'btn btn-primary',
    onclick: () => {
      let items;
      if (scope === 'all') items = pool;
      else {
        const catWorks = WORKS[scope].items.map(it => it.id);
        items = pool.filter(q => catWorks.includes(q.workId));
      }
      items = shuffle(items);
      if (typeof count === 'number') items = items.slice(0, count);
      if (!items.length) { alert('해당 범위에 문제가 없습니다.'); return; }
      setup.remove();
      startQuizFlow(items, mode, null, scope);
    }
  }, `시작 (${(scope === 'all' ? pool.length : pool.filter(q => WORKS[scope].items.some(it => it.id === q.workId)).length)}문항 중)`));
  modal.appendChild(actions);

  setup.appendChild(modal);
  document.body.appendChild(setup);
}

function startQuizFlow(items, mode, workId, scope) {
  STATE.quizSession = {
    items, mode, workId, scope,
    index: 0, answers: [], startedAt: Date.now(),
  };
  STATE.currentTab = 'quiz';
  STATE.currentWorkId = null;
  STATE.quizResult = null;
  render();
  window.scrollTo(0, 0);
}

function renderQuizPlay(main) {
  const s = STATE.quizSession;
  const q = s.items[s.index];
  const pct = Math.round((s.index / s.items.length) * 100);

  const wrap = el('div', { class:'quiz-container' });

  // Progress
  const prog = el('div', { class:'quiz-progress' });
  prog.appendChild(el('span', {}, `${s.index + 1} / ${s.items.length}`));
  prog.appendChild(el('span', {}, s.mode === 'ox' ? 'O/X' : s.mode === 'mcq' ? '객관식' : '빈칸'));
  wrap.appendChild(prog);
  const bar = el('div', { class:'quiz-bar' });
  const fill = el('div', { class:'quiz-bar-fill' });
  fill.style.width = pct + '%';
  bar.appendChild(fill);
  wrap.appendChild(bar);

  // Question block
  const qBlock = el('div', { class:'quiz-question' });
  // Work context label
  const workRef = findWork(q.workId);
  if (workRef) {
    qBlock.appendChild(el('div', { class:'quiz-q-label' }, `${WORKS[workRef.cat].label} · ${workRef.work.title}`));
  }
  qBlock.appendChild(el('div', { class:'quiz-q-text' }, q.q));
  wrap.appendChild(qBlock);

  // For MCQ, if the work is a dokseo, show passage summary
  if (s.mode === 'mcq' && workRef && workRef.cat === 'dokseo') {
    const pass = el('div', { class:'quiz-q-passage' });
    // Concatenate all paragraph contents into an excerpt
    const excerpts = (workRef.work.paragraphs || []).map(p => `<strong>${p.num}문단 · ${p.title}</strong><br>${p.content}`).join('<br><br>');
    pass.innerHTML = excerpts;
    wrap.appendChild(pass);
  } else if (s.mode === 'mcq' && workRef) {
    // For literature: show the work summary
    const pass = el('div', { class:'quiz-q-passage' });
    pass.innerHTML = `<strong>${workRef.work.title} — 핵심</strong><br>${workRef.work.summary || ''}`;
    wrap.appendChild(pass);
  }

  // Answer area
  if (s.mode === 'ox') {
    const row = el('div', { class:'quiz-ox-row' });
    ['O','X'].forEach((mark, i) => {
      const btn = el('button', {
        class:'quiz-ox',
        onclick: () => submitAnswer(i === 0),
      }, mark);
      row.appendChild(btn);
    });
    wrap.appendChild(row);
  }
  else if (s.mode === 'mcq') {
    const opts = el('div', { class:'quiz-options' });
    q.opts.forEach((optText, i) => {
      const o = el('button', {
        class:'quiz-opt',
        onclick: () => submitAnswer(i),
      });
      o.appendChild(el('span', { class:'quiz-opt-num' }, `${i+1}`));
      o.appendChild(el('span', {}, optText));
      opts.appendChild(o);
    });
    wrap.appendChild(opts);
  }
  else if (s.mode === 'fill') {
    const input = el('input', {
      type:'text',
      class:'quiz-fill-input',
      id:'fill-input',
      placeholder:'정답 입력...',
      autocomplete:'off',
      autocapitalize:'none',
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = input.value;
        submitAnswer(val);
      }
    });
    wrap.appendChild(input);
    const submitBtn = el('button', {
      class:'btn btn-primary',
      style:'margin-top:0.6rem;width:100%;',
      onclick: () => submitAnswer(input.value),
    }, '제출');
    wrap.appendChild(submitBtn);
    // Focus
    setTimeout(() => input.focus(), 100);
  }

  // Exit
  const exit = el('button', {
    class:'btn btn-ghost',
    style:'margin-top:1.5rem;width:100%;',
    onclick: () => {
      if (confirm('퀴즈를 중단하시겠어요? 현재 진행 상태가 사라집니다.')) {
        STATE.quizSession = null;
        render();
      }
    }
  }, '중단하기');
  wrap.appendChild(exit);

  main.appendChild(wrap);
}

function submitAnswer(userAns) {
  const s = STATE.quizSession;
  const q = s.items[s.index];
  let correct = false;
  if (s.mode === 'ox') {
    correct = userAns === q.a;
  } else if (s.mode === 'mcq') {
    correct = userAns === q.a;
  } else if (s.mode === 'fill') {
    const norm = normalizeAnswer(userAns);
    correct = q.a.some(a => normalizeAnswer(a) === norm);
  }
  s.answers.push({ q, userAns, correct });

  // Show feedback for a moment, then advance
  showAnswerFeedback(q, userAns, correct);
}

function showAnswerFeedback(q, userAns, correct) {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  const s = STATE.quizSession;

  const wrap = el('div', { class:'quiz-container' });

  // Progress
  const prog = el('div', { class:'quiz-progress' });
  prog.appendChild(el('span', {}, `${s.index + 1} / ${s.items.length}`));
  prog.appendChild(el('span', { style:'color:' + (correct ? 'var(--moss)' : 'var(--seal)') + ';font-weight:600;' },
    correct ? '✓ 정답' : '✗ 오답'));
  wrap.appendChild(prog);

  const qBlock = el('div', { class:'quiz-question' });
  const workRef = findWork(q.workId);
  if (workRef) qBlock.appendChild(el('div', { class:'quiz-q-label' }, `${WORKS[workRef.cat].label} · ${workRef.work.title}`));
  qBlock.appendChild(el('div', { class:'quiz-q-text' }, q.q));
  wrap.appendChild(qBlock);

  // Show answer
  if (s.mode === 'ox') {
    const row = el('div', { class:'quiz-ox-row' });
    ['O','X'].forEach((mark, i) => {
      const isSelected = (i === 0) === userAns;
      const isAns = (i === 0) === q.a;
      const cls = isAns ? 'correct' : (isSelected ? 'wrong' : '');
      row.appendChild(el('div', { class:'quiz-ox ' + cls }, mark));
    });
    wrap.appendChild(row);
  }
  else if (s.mode === 'mcq') {
    const opts = el('div', { class:'quiz-options' });
    q.opts.forEach((optText, i) => {
      const isSelected = i === userAns;
      const isAns = i === q.a;
      const cls = isAns ? 'correct' : (isSelected ? 'wrong' : '');
      const o = el('div', { class:'quiz-opt ' + cls });
      o.appendChild(el('span', { class:'quiz-opt-num' }, `${i+1}`));
      o.appendChild(el('span', {}, optText));
      opts.appendChild(o);
    });
    wrap.appendChild(opts);
  }
  else if (s.mode === 'fill') {
    const cls = correct ? 'correct' : 'wrong';
    const inp = el('div', { class:'quiz-fill-input ' + cls },
      userAns || '(미입력)');
    inp.style.pointerEvents = 'none';
    wrap.appendChild(inp);
    const ansDisp = el('div', {
      style:'margin-top:0.6rem;padding:0.7rem 0.9rem;background:rgba(90,107,58,0.1);border-left:3px solid var(--moss);border-radius:2px;font-size:0.88rem;'
    });
    ansDisp.innerHTML = `<strong style="color:var(--moss);font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;display:block;margin-bottom:0.3rem;">ANSWER · 정답</strong>${q.a.join(' / ')}`;
    wrap.appendChild(ansDisp);
  }

  // Explanation
  if (q.exp) {
    const exp = el('div', { class:'quiz-explain' });
    exp.appendChild(el('span', { class:'quiz-explain-label' }, 'HINT · 해설'));
    exp.appendChild(document.createTextNode(q.exp));
    wrap.appendChild(exp);
  }

  // Next button
  const nextBtn = el('button', {
    class:'btn btn-primary',
    style:'margin-top:1.2rem;width:100%;',
    onclick: () => {
      s.index++;
      if (s.index >= s.items.length) {
        finishQuiz();
      } else {
        render();
        window.scrollTo(0, 0);
      }
    }
  }, s.index + 1 >= s.items.length ? '결과 보기' : '다음 문제 →');
  wrap.appendChild(nextBtn);

  main.appendChild(wrap);
}

function finishQuiz() {
  const s = STATE.quizSession;
  const correct = s.answers.filter(a => a.correct).length;
  const total = s.answers.length;
  const result = {
    date: Date.now(),
    mode: s.mode,
    modeLabel: s.mode === 'ox' ? 'OX' : s.mode === 'mcq' ? '객관식' : '빈칸',
    score: correct,
    total,
    scope: s.scope === 'all' ? '전체' : (s.scope ? WORKS[s.scope]?.label : null),
    workId: s.workId,
    wrongAnswers: s.answers.filter(a => !a.correct).map(a => ({ q: a.q.q, ans: a.q.a, user: a.userAns, exp: a.q.exp })),
  };
  STATE.quizResults.push(result);
  saveState();
  STATE.quizResult = result;
  STATE.quizSession = null;
  render();
  window.scrollTo(0, 0);
}

function renderQuizResult(main) {
  const r = STATE.quizResult;
  const pct = Math.round(r.score / r.total * 100);

  const screen = el('div', { class:'result-screen' });
  screen.appendChild(el('div', { class:'result-seal' }, pct >= 80 ? '秀' : pct >= 60 ? '良' : '可'));
  screen.appendChild(el('div', { class:'result-title' }, pct >= 80 ? '수고하셨습니다!' : pct >= 60 ? '잘 했어요' : '다시 도전해 보세요'));
  screen.appendChild(el('div', { class:'result-score' }, `${r.score} / ${r.total}`));
  screen.appendChild(el('div', { class:'result-meta' }, `${pct}% · ${r.modeLabel}` + (r.scope ? ' · ' + r.scope : '')));

  // Controls
  const controls = el('div', { class:'quiz-controls' });
  controls.appendChild(el('button', {
    class:'btn btn-primary',
    onclick: () => { STATE.quizResult = null; render(); },
  }, '확인'));
  screen.appendChild(controls);

  main.appendChild(screen);

  // Wrong answers review
  if (r.wrongAnswers && r.wrongAnswers.length) {
    main.appendChild(makeSectionTitle('틀린 문제 복습', 'review'));
    r.wrongAnswers.forEach(w => {
      const box = el('div', { class:'analysis-block' });
      const head = el('div', { class:'analysis-head' });
      head.appendChild(el('span', { class:'analysis-label' }, 'WRONG'));
      head.appendChild(el('span', { class:'analysis-title', style:'font-size:0.85rem;' }, w.q.length > 60 ? w.q.slice(0, 60) + '...' : w.q));
      box.appendChild(head);
      const body = el('div', { class:'analysis-body' });
      if (r.mode === 'ox') {
        body.innerHTML = `정답: <strong>${w.ans ? 'O' : 'X'}</strong>`;
      } else if (r.mode === 'mcq') {
        body.innerHTML = `정답: <strong>${(w.ans + 1)}번</strong>`;
      } else if (r.mode === 'fill') {
        body.innerHTML = `정답: <strong>${Array.isArray(w.ans) ? w.ans.join(' / ') : w.ans}</strong>`;
      }
      if (w.exp) {
        body.innerHTML += `<div style="margin-top:0.5rem;padding-top:0.5rem;border-top:1px dashed var(--line);font-size:0.85rem;color:var(--ink-soft);">${escapeHTML(w.exp)}</div>`;
      }
      box.appendChild(body);
      main.appendChild(box);
    });
  }
}

// ---------- PROGRESS ----------
function renderProgress(main) {
  main.appendChild(makeSectionTitle('학습 진도', 'progress'));

  // Overall
  const totalWorks = countAllWorks();
  const doneWorks = Object.values(STATE.progress).filter(v => v).length;
  const totalQuizzes = (STATE.quizResults || []).length;
  const avgScore = STATE.quizResults?.length
    ? Math.round(STATE.quizResults.reduce((sum, r) => sum + (r.score / r.total * 100), 0) / STATE.quizResults.length)
    : 0;

  const hero = el('div', { class:'home-hero' });
  hero.appendChild(el('div', { class:'hero-kicker' }, 'Dashboard'));
  hero.appendChild(el('div', { class:'hero-title', html: `작품 ${doneWorks}/${totalWorks} 완료` }));
  hero.appendChild(el('div', { class:'hero-desc', html: `누적 퀴즈 <strong>${totalQuizzes}회</strong> · 평균 정답률 <strong>${avgScore}%</strong>` }));
  main.appendChild(hero);

  // Category breakdown
  ['gojeon_siga','hyundae_si','gojeon_sanmun','dokseo'].forEach(key => {
    const cat = WORKS[key];
    main.appendChild(makeSectionTitle(cat.label, cat.hanja));
    const list = el('div', { class:'work-list' });
    cat.items.forEach((item, idx) => {
      list.appendChild(makeWorkCard(item, key, idx + 1));
    });
    main.appendChild(list);
  });

  // Reset
  main.appendChild(el('button', {
    class:'btn btn-ghost',
    style:'margin-top:2rem;width:100%;',
    onclick: () => {
      if (confirm('모든 진도와 기록이 초기화됩니다. 계속할까요?')) {
        STATE.progress = {};
        STATE.quizResults = [];
        STATE.flashcardsSeen = {};
        saveState();
        render();
      }
    }
  }, '모든 기록 초기화'));
}

// ---------- DARK MODE ----------

  document.body.classList.toggle('dark');
  STATE.darkMode = document.body.classList.contains('dark');
  saveState();
  render();
}

// ---------- SCROLL: HIDE HEADER ON SCROLL DOWN, SHOW ON SCROLL UP ----------
let lastScroll = 0;
let scrollTicking = false;
const SCROLL_THRESHOLD = 8; // ignore tiny scrolls

function handleScroll() {
  const y = window.scrollY;
  const header = document.querySelector('header');
  if (!header) { scrollTicking = false; return; }

  const delta = y - lastScroll;

  if (y < 80) {
    // near top — always show
    header.classList.remove('hidden');
  } else if (delta > SCROLL_THRESHOLD) {
    // scrolling down — hide
    header.classList.add('hidden');
  } else if (delta < -SCROLL_THRESHOLD) {
    // scrolling up — show
    header.classList.remove('hidden');
  }
  lastScroll = y;
  scrollTicking = false;
}

function attachScrollListener() {
  window.addEventListener('scroll', () => {
    if (!scrollTicking) {
      window.requestAnimationFrame(handleScroll);
      scrollTicking = true;
    }
  }, { passive: true });
}

// ---------- INIT ----------
function init() {
  loadState();
  if (STATE.darkMode) document.body.classList.add('dark');
  if (window.matchMedia('(display-mode: standalone)').matches) {
    document.body.classList.add('pwa-mode');
  }
  render();
  attachScrollListener();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

</script>
